<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Eclipsa Sorteio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background: radial-gradient(circle,#1b0033,#000);
font-family:Arial;
color:white;
}

h1{
margin-bottom:40px;
text-shadow:0 0 15px #ff00ff;
}

.roleta{
width:320px;
height:320px;
border-radius:50%;
border:8px solid white;
background:
conic-gradient(
#ff4d4d 0deg 60deg,
#ff944d 60deg 120deg,
#ffd24d 120deg 180deg,
#4dff88 180deg 240deg,
#4da6ff 240deg 300deg,
#c44dff 300deg 360deg
);
display:flex;
align-items:center;
justify-content:center;
transition: transform 5s ease-out;
}

.texto{
position:absolute;
width:320px;
height:320px;
display:flex;
align-items:center;
justify-content:center;
pointer-events:none;
}

.texto span{
position:absolute;
font-size:14px;
font-weight:bold;
}

button{
margin-top:40px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff00cc;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>ECLIPSA SORTEIO</h1>

<div id="roleta" class="roleta"></div>

<div class="texto">
<span style="transform:rotate(30deg) translate(120px) rotate(-30deg)">Fantasia</span>
<span style="transform:rotate(90deg) translate(120px) rotate(-90deg)">Bolo</span>
<span style="transform:rotate(150deg) translate(120px) rotate(-150deg)">Nostalgia</span>
<span style="transform:rotate(210deg) translate(120px) rotate(-210deg)">Livro</span>
<span style="transform:rotate(270deg) translate(120px) rotate(-270deg)">Filme</span>
<span style="transform:rotate(330deg) translate(120px) rotate(-330deg)">Pintura</span>
</div>

<button onclick="girar()">GIRAR</button>

<audio id="som">
<source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3">
</audio>

<script>

let rotacao = 0

function girar(){

let roleta = document.getElementById("roleta")
let som = document.getElementById("som")

rotacao += Math.floor(Math.random()*2000)+2000

roleta.style.transform = "rotate("+rotacao+"deg)"

som.currentTime = 0
som.play()

}

</script>

</body>
</html>
